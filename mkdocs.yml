site_name: Gabbai CAD
site_description: Gabbai CAD Project Repository
site_url: ""

theme:
  name: material
  features:
    - navigation.expand
    - navigation.sections
    - search.highlight
    - search.suggest

plugins:
  - search

markdown_extensions:
  - tables
  - fenced_code
  - toc

docs_dir: site_docs

use_directory_urls: true

site_name: Gabbai CAD
site_description: Gabbai CAD Project Repository
site_url: ""

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.expand
    - navigation.sections
    - search.highlight
    - search.suggest

plugins:
  - search

markdown_extensions:
  - tables
  - fenced_code
  - toc

docs_dir: site_docs

use_directory_urls: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ElanGoldman/Gabbai_CAD
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/elangoldman/
      name: LinkedIn
    - icon: fontawesome/solid/globe
      link: https://elangoldman.com
      name: Personal Site
